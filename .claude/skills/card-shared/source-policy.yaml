issuer_source_notes:
  - Issuer blogs, newsrooms, and press release pages (e.g., media.chase.com, aboutamex.com) are treated as primary issuer sources, not secondary sources.
  - Issuer social media accounts (Twitter/X, Instagram, YouTube) remain disallowed — use the issuer's own website or newsroom instead.
  - Press releases from issuer newsrooms are valid for confirming product changes, new launches, and benefit updates.

secondary_domains:
  selected_on: 2026-03-12
  methodology: curated shortlist of 6 high-signal sources — best mainstream reviewer, best points-and-miles sites, best breaking-news tracker
  approved_for:
    - best_public_signup_offer
    - missing_benefit_details
    - usage_limit_cross_check
  sources:
    - rank: 1
      name: NerdWallet
      domain: nerdwallet.com
      url: https://www.nerdwallet.com
      category: mainstream-finance
      best_for: [card-full, card-compare, card-value]
    - rank: 2
      name: The Points Guy
      domain: thepointsguy.com
      url: https://thepointsguy.com/credit-cards/
      category: points-and-miles
      best_for: [card-full, card-transfer, card-value, card-news]
    - rank: 3
      name: Doctor of Credit
      domain: doctorofcredit.com
      url: https://www.doctorofcredit.com/credit-cards/
      category: points-and-miles
      best_for: [card-news, card-full]
    - rank: 4
      name: Bankrate Credit Cards
      domain: bankrate.com
      url: https://www.bankrate.com/credit-cards/
      category: mainstream-finance
      best_for: [card-rate, card-credits]
    - rank: 5
      name: One Mile at a Time
      domain: onemileatatime.com
      url: https://onemileatatime.com/guides/credit-cards/
      category: points-and-miles
      best_for: [card-credits, card-compare]
    - rank: 6
      name: Upgraded Points
      domain: upgradedpoints.com
      url: https://upgradedpoints.com/credit-cards/
      category: points-and-miles
      best_for: [card-transfer, card-wallet]
  domains:
    - nerdwallet.com
    - thepointsguy.com
    - doctorofcredit.com
    - bankrate.com
    - onemileatatime.com
    - upgradedpoints.com

disallowed_sources:
  - reddit.com
  - facebook.com
  - instagram.com
  - tiktok.com
  - x.com
  - youtube.com
  - offer referral links
  - targeted or mailed offers
  - user-generated forums

selection_rules:
  - Prefer issuer pages for benefits, terms, and issuer-specific credits.
  - Use the `sources` list above as the preferred secondary-source allowlist for current article and guide discovery.
  - Prefer the strongest publicly available and clearly live offer among approved sources.
  - Do not use a secondary source when the issuer page already resolves the fact cleanly unless validating a better public offer.
  - When a source is stale or undated, lower confidence or omit the claim.

search_method:
  engine: brave-search-api
  env_var: BRAVE_API_KEY
  base_url: https://api.search.brave.com/res/v1/web/search
  usage: |
    Use Bash with curl instead of WebSearch/WebFetch. This is much faster (~1s vs 30-60s).

    For knowledge-first commands (one issuer search):
      curl -sS "https://api.search.brave.com/res/v1/web/search?q=CARD_NAME+site:ISSUER_DOMAIN&count=5" \
        -H "X-Subscription-Token: $BRAVE_API_KEY"

    For search-required commands (issuer + secondary in one call):
      curl -sS "https://api.search.brave.com/res/v1/web/search?q=CARD_NAME+QUERY_TERMS&count=20" \
        -H "X-Subscription-Token: $BRAVE_API_KEY"

    Parse the JSON response — results are in .web.results[] with .title, .url, .description fields.
    If BRAVE_API_KEY is not set, fall back to WebSearch.
  notes:
    - Always use site: filters to scope results to approved domains
    - One API call can cover issuer + secondary sources together
    - Free tier allows 2000 queries/month

fast_search_policy:
  target_budget: 30s
  phases:
    - name: resolve
      budget: 0-5s
      action: Normalize card name, resolve exact variant using card-identity-rules.
    - name: search
      budget: 5-15s
      action: One Brave API call with site filters for issuer (and secondary if search-required).
    - name: finalize
      budget: 15-30s
      action: Assemble compact output from search snippets + training knowledge. Flag unresolved fields in confidence_notes.
  command_source_ceilings:
    card-rate:
      strategy: knowledge-first
      max_secondary: 1
      notes: Issuer page + one secondary for merchant-coding caveats.
      preferred: [bankrate.com]
    card-credits:
      strategy: knowledge-first
      max_secondary: 1
      notes: Issuer page + one secondary for credit trigger details.
      preferred: [bankrate.com]
    card-transfer:
      strategy: knowledge-first
      max_secondary: 1
      notes: Issuer page + one secondary for current transfer ratios.
      preferred: [thepointsguy.com]
    card-wallet:
      strategy: knowledge-first
      max_secondary: 0
      notes: One issuer page per card + training data only.
    card-full:
      strategy: search-required
      max_secondary: 5
      parallel: true
      preferred: [nerdwallet.com, thepointsguy.com, doctorofcredit.com, bankrate.com, onemileatatime.com]
    card-news:
      strategy: search-required
      max_secondary: 5
      parallel: true
      preferred: [doctorofcredit.com, thepointsguy.com, onemileatatime.com, nerdwallet.com, bankrate.com]
    card-compare:
      strategy: search-required
      max_secondary: 5
      parallel: true
      preferred: [nerdwallet.com, thepointsguy.com, doctorofcredit.com, onemileatatime.com, bankrate.com]
    card-value:
      strategy: search-required
      max_secondary: 5
      parallel: true
      preferred: [nerdwallet.com, thepointsguy.com, bankrate.com, onemileatatime.com, doctorofcredit.com]
  stop_rules:
    - Stop once all required contract fields are covered.
    - Do not chase optional details after the contract is satisfied.
    - Prefer a compact partially-resolved answer with clear uncertainty over an exhaustive search that exceeds the budget.
