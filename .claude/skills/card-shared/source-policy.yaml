version: 2
scope:
  geography: US
  issuers:
    - American Express
    - Bank of America
    - Barclays
    - Bilt
    - Capital One
    - Chase
    - Citi
    - Discover
    - Robinhood
    - U.S. Bank
    - Wells Fargo
  rule: major-us-card-brands

issuer_domains:
  American Express:
    - americanexpress.com
    - aboutamex.com
  Bank of America:
    - bankofamerica.com
    - newsroom.bankofamerica.com
  Barclays:
    - cards.barclaycardus.com
    - barclays.com/credit-cards
  Bilt:
    - bfrrewards.com
    - bfrrewards.com/credit-cards
  Capital One:
