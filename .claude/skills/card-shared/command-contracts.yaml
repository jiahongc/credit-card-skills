shared:
  common_heading_suffix: "<card name>"
  common_yaml_keys:
    - card_name
    - issuer
    - network
    - card_family
    - card_variant
    - sources
    - confidence_notes
  output_rules:
    - YAML is internal only; never include a YAML block in user-facing output.
    - End every report with a "## 🔗 Sources" section listing each URL fetched during research as a markdown hyperlink with a short "Site - Topic" label, e.g. [Chase - Sapphire Preferred](https://creditcards.chase.com/...).
    - Use one emoji per section heading.
    - Use numbered lists for list-heavy sections.
    - Omit the Card Identity section when the card match is confident.
    - Show a Card Identity section only when the match is ambiguous or unconfirmed.
    - Keep section content to condensed facts only.
